<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <title>Forest camp — multi-day retreat scene</title>
  <desc>Forest clearing with a tent, a campfire with rising smoke, and a few people gathered. For multi-day events and retreats imagery.</desc>

  <defs>
    <linearGradient id="forestSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D9A8"/>
      <stop offset="100%" stop-color="#E6C079"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="520" fill="url(#forestSky)"/>

  <!-- Sun rays through trees -->
  <g opacity="0.32">
    <polygon points="600,90 545,520 655,520" fill="#F7EFE0"/>
    <polygon points="500,140 472,520 528,520" fill="#F7EFE0"/>
    <polygon points="700,140 672,520 728,520" fill="#F7EFE0"/>
  </g>

  <!-- Distant trees (muted, less green) -->
  <g fill="#8A7E50">
    <path d="M 0 500 L 50 350 L 70 400 L 100 320 L 130 410 L 160 360 L 200 500 Z"/>
    <path d="M 180 500 L 230 330 L 260 390 L 290 300 L 320 410 L 350 350 L 380 500 Z"/>
    <path d="M 800 500 L 850 330 L 880 390 L 910 300 L 940 410 L 970 350 L 1000 500 Z"/>
    <path d="M 980 500 L 1030 340 L 1060 400 L 1090 310 L 1120 410 L 1150 360 L 1200 500 Z"/>
  </g>

  <!-- Mid pine trees (kept green for the forest) -->
  <g fill="#44512D">
    <g transform="translate(120, 400)">
      <rect x="-8" y="0" width="16" height="60" fill="#6B3410"/>
      <path d="M 0 -200 L -45 -100 L -25 -100 L -55 -40 L -30 -40 L -65 30 L 65 30 L 30 -40 L 55 -40 L 25 -100 L 45 -100 Z"/>
    </g>
    <g transform="translate(1080, 380)">
      <rect x="-8" y="0" width="16" height="80" fill="#6B3410"/>
      <path d="M 0 -220 L -50 -110 L -28 -110 L -60 -45 L -32 -45 L -70 30 L 70 30 L 32 -45 L 60 -45 L 28 -110 L 50 -110 Z"/>
    </g>
  </g>

  <!-- Ground (earthy brown — less green) -->
  <path d="M 0 500 Q 600 482 1200 500 L 1200 800 L 0 800 Z" fill="#B2925E"/>
  <path d="M 0 600 Q 600 582 1200 600 L 1200 800 L 0 800 Z" fill="#8A6E47"/>

  <!-- Tent in the forest -->
  <g transform="translate(880, 580)">
    <path d="M 0 -96 L -74 2 L 74 2 Z" fill="#C25E2A"/>
    <path d="M 0 -96 L 74 2 L 38 2 L 0 -82 Z" fill="#A8491E"/>
    <path d="M 0 -90 L -24 2 L 24 2 Z" fill="#5E2F14"/>
    <line x1="0" y1="-96" x2="0" y2="-110" stroke="#6B3410" stroke-width="4" stroke-linecap="round"/>
    <path d="M -74 2 L -86 2 M 74 2 L 86 2" stroke="#6B3410" stroke-width="3"/>
  </g>

  <!-- People gathered around the fire -->
  <g fill="#6B3410">
    <!-- far person (left, smaller) -->
    <g transform="translate(452, 560) scale(0.85)">
      <circle cx="0" cy="-46" r="13"/>
      <path d="M -21 2 Q -23 -36 0 -36 Q 23 -36 21 2 Z"/>
    </g>
    <!-- left person -->
    <g transform="translate(518, 584)">
      <circle cx="0" cy="-48" r="14"/>
      <path d="M -22 2 Q -24 -38 0 -38 Q 24 -38 22 2 Z"/>
    </g>
    <!-- right person -->
    <g transform="translate(690, 584)">
      <circle cx="0" cy="-48" r="14"/>
      <path d="M -22 2 Q -24 -38 0 -38 Q 24 -38 22 2 Z"/>
    </g>
  </g>

  <!-- Campfire -->
  <g transform="translate(604, 590)">
    <path d="M -30 6 L 30 -4" stroke="#6B3410" stroke-width="10" stroke-linecap="round"/>
    <path d="M -30 -4 L 30 6" stroke="#7A4A24" stroke-width="10" stroke-linecap="round"/>
    <path d="M 0 -4 Q -18 -22 -9 -46 Q -2 -32 2 -46 Q 1 -24 10 -40 Q 16 -20 0 -4 Z" fill="#E2742E"/>
    <path d="M 0 -8 Q -9 -24 -2 -44 Q 2 -30 5 -42 Q 9 -22 0 -8 Z" fill="#F4C95D"/>
  </g>

  <!-- Smoke rising up -->
  <g fill="#9C9488">
    <circle cx="606" cy="522" r="11" opacity="0.30"/>
    <circle cx="618" cy="490" r="14" opacity="0.26"/>
    <circle cx="602" cy="454" r="16" opacity="0.22"/>
    <circle cx="616" cy="416" r="18" opacity="0.18"/>
    <circle cx="604" cy="376" r="20" opacity="0.14"/>
    <circle cx="614" cy="334" r="22" opacity="0.10"/>
  </g>

  <!-- A few sparkles -->
  <g fill="#F7EFE0" opacity="0.6">
    <circle cx="320" cy="220" r="2"/>
    <circle cx="420" cy="300" r="1.5"/>
    <circle cx="780" cy="210" r="2"/>
    <circle cx="860" cy="300" r="1.5"/>
  </g>

</svg>
