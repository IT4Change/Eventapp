<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <title>Vision — meditation at sunset in the forest</title>
  <desc>A seated figure meditating cross-legged, backlit by a warm reddish-to-yellow sunset glow, framed by a quiet forest. Earthy palette, soft filled shapes, minimal outlines.</desc>

  <defs>
    <!-- Sunset glow: bright warm-yellow core fading through orange to a reddish coral edge -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6D6"/>
      <stop offset="26%" stop-color="#F9D277"/>
      <stop offset="52%" stop-color="#F4A94E"/>
      <stop offset="78%" stop-color="#EE9244"/>
      <stop offset="100%" stop-color="#F7EFE0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="#F7EFE0"/>

  <!-- Sun / sunset glow behind the figure -->
  <circle cx="640" cy="360" r="340" fill="url(#sunGlow)"/>
  <!-- Extra bright halo right behind the head -->
  <circle cx="640" cy="378" r="64" fill="#FFF6DD" opacity="0.55"/>

  <!-- Distant tree line (muted, low) -->
  <g fill="#7A8B4A" opacity="0.38">
    <path d="M -20 605 L 70 505 L 150 565 L 235 495 L 320 560 L 405 500 L 495 558 L 585 498 L 675 558 L 765 500 L 855 560 L 945 495 L 1035 562 L 1120 502 L 1210 560 L 1300 505 L 1300 605 Z"/>
  </g>

  <!-- Framing trees -->
  <g fill="#5E6B38">
    <g transform="translate(200, 585) scale(0.62)">
      <rect x="-9" y="0" width="18" height="70" fill="#6B3410"/>
      <path d="M 0 -210 L -48 -105 L -26 -105 L -58 -42 L -32 -42 L -68 32 L 68 32 L 32 -42 L 58 -42 L 26 -105 L 48 -105 Z"/>
    </g>
    <g transform="translate(330, 595) scale(0.5)">
      <rect x="-9" y="0" width="18" height="70" fill="#6B3410"/>
      <path d="M 0 -210 L -48 -105 L -26 -105 L -58 -42 L -32 -42 L -68 32 L 68 32 L 32 -42 L 58 -42 L 26 -105 L 48 -105 Z"/>
    </g>
    <g transform="translate(1080, 585) scale(0.62)">
      <rect x="-9" y="0" width="18" height="70" fill="#6B3410"/>
      <path d="M 0 -210 L -48 -105 L -26 -105 L -58 -42 L -32 -42 L -68 32 L 68 32 L 32 -42 L 58 -42 L 26 -105 L 48 -105 Z"/>
    </g>
    <g transform="translate(950, 595) scale(0.5)">
      <rect x="-9" y="0" width="18" height="70" fill="#6B3410"/>
      <path d="M 0 -210 L -48 -105 L -26 -105 L -58 -42 L -32 -42 L -68 32 L 68 32 L 32 -42 L 58 -42 L 26 -105 L 48 -105 Z"/>
    </g>
  </g>
  <g fill="#7A8B4A" opacity="0.7">
    <g transform="translate(95, 605) scale(0.42)">
      <rect x="-9" y="0" width="18" height="70" fill="#6B3410"/>
      <path d="M 0 -210 L -48 -105 L -26 -105 L -58 -42 L -32 -42 L -68 32 L 68 32 L 32 -42 L 58 -42 L 26 -105 L 48 -105 Z"/>
    </g>
    <g transform="translate(1190, 605) scale(0.42)">
      <rect x="-9" y="0" width="18" height="70" fill="#6B3410"/>
      <path d="M 0 -210 L -48 -105 L -26 -105 L -58 -42 L -32 -42 L -68 32 L 68 32 L 32 -42 L 58 -42 L 26 -105 L 48 -105 Z"/>
    </g>
  </g>

  <!-- Ground shadow beneath the figure -->
  <ellipse cx="640" cy="588" rx="160" ry="22" fill="#6B3410" opacity="0.16"/>

  <!-- ============ Meditating figure (slightly smaller) ============ -->
  <g transform="translate(640, 580) scale(0.8)" fill="#6B3410">
    <!-- Crossed legs (lotus) -->
    <path d="M -148 -6 C -160 -34 -150 -58 -120 -60 C -96 -62 -70 -58 -50 -62 L 50 -62 C 70 -58 96 -62 120 -60 C 150 -58 160 -34 148 -6 C 100 6 -100 6 -148 -6 Z"/>
    <!-- Torso (upright) -->
    <path d="M -30 -58 C -36 -120 -40 -160 -36 -190 C -30 -208 -14 -214 0 -214 C 14 -214 30 -208 36 -190 C 40 -160 36 -120 30 -58 Z"/>
    <!-- Arms resting on the knees -->
    <path d="M -34 -196 Q -88 -150 -106 -70" stroke="#6B3410" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M 34 -196 Q 88 -150 106 -70" stroke="#6B3410" stroke-width="13" fill="none" stroke-linecap="round"/>
    <!-- Resting hands -->
    <ellipse cx="-107" cy="-64" rx="12" ry="8"/>
    <ellipse cx="107" cy="-64" rx="12" ry="8"/>
    <!-- Head -->
    <circle cx="0" cy="-244" r="26"/>
  </g>

  <!-- Soft light specks -->
  <g fill="#FBF4E2" opacity="0.6">
    <circle cx="470" cy="250" r="3"/>
    <circle cx="820" cy="225" r="2.5"/>
    <circle cx="600" cy="160" r="2"/>
    <circle cx="720" cy="265" r="2"/>
    <circle cx="520" cy="320" r="2.5"/>
    <circle cx="790" cy="330" r="2"/>
  </g>

</svg>
