<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <title>Music makers — drum, guitar, song</title>
  <desc>A small group making music together: a djembe drummer, a seated guitarist and a singer, with floating notes. Earthy palette, soft filled shapes.</desc>

  <rect width="1200" height="500" fill="#F7EFE0"/>

  <!-- Warm sun behind -->
  <circle cx="600" cy="210" r="185" fill="#F2D9A8"/>
  <circle cx="600" cy="210" r="140" fill="#D4A047" opacity="0.45"/>

  <!-- Floor shadow -->
  <ellipse cx="600" cy="442" rx="490" ry="18" fill="#6B3410" opacity="0.13"/>

  <!-- ============ Drummer + djembe (left) ============ -->
  <g transform="translate(300, 410)">
    <!-- legs -->
    <g fill="#6B3410">
      <path d="M -27 -126 L -34 0 L -19 0 L -13 -124 Z"/>
      <path d="M 27 -126 L 34 0 L 19 0 L 13 -124 Z"/>
    </g>
    <!-- torso (olive) -->
    <path d="M -23 -212 Q -27 -172 -25 -126 L 25 -126 Q 27 -172 23 -212 Q 12 -224 0 -224 Q -12 -224 -23 -212 Z" fill="#7A8B4A"/>
    <!-- head -->
    <circle cx="0" cy="-242" r="22" fill="#6B3410"/>
    <!-- arms reaching onto drum -->
    <path d="M -21 -206 Q -45 -182 -25 -148" stroke="#6B3410" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M 21 -206 Q 45 -182 25 -148" stroke="#6B3410" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- djembe (no rim lines on the head) -->
    <g transform="translate(0, -140)">
      <path d="M -38 0 Q -35 54 -13 84 L -17 130 Q -17 137 -10 137 L 10 137 Q 17 137 17 130 L 13 84 Q 35 54 38 0 Z" fill="#9C5A2E"/>
      <path d="M 8 3 Q 25 50 11 130 L 17 130 L 13 84 Q 35 54 38 0 Z" fill="#7A3F1E" opacity="0.45"/>
      <ellipse cx="0" cy="0" rx="38" ry="11" fill="#E0B584"/>
      <ellipse cx="0" cy="1.5" rx="38" ry="9.5" fill="#CF9E68"/>
      <!-- hands -->
      <ellipse cx="-18" cy="-1" rx="8" ry="5.5" fill="#6B3410"/>
      <ellipse cx="18" cy="-1" rx="8" ry="5.5" fill="#6B3410"/>
    </g>
  </g>

  <!-- ============ Guitarist (center, seated) ============ -->
  <g transform="translate(602, 410)">
    <!-- folded legs (seated) -->
    <path d="M -78 0 Q -84 -38 -32 -44 L 32 -44 Q 84 -38 78 0 Z" fill="#6B3410"/>
    <!-- torso (gold) -->
    <path d="M -22 -156 Q -26 -116 -24 -52 L 24 -52 Q 26 -116 22 -156 Q 11 -168 0 -168 Q -11 -168 -22 -156 Z" fill="#D4A047"/>
    <!-- head -->
    <circle cx="0" cy="-186" r="21" fill="#6B3410"/>
    <!-- guitar (smaller, realistic, held diagonally on the lap) -->
    <g transform="translate(14, -66) rotate(-52)">
      <path d="M 0 -62 C 21 -62 27 -49 27 -36 C 27 -22 21 -11 19 -2 C 18 10 27 21 33 33 C 38 47 35 66 19 70 C 13 74 -13 74 -19 70 C -35 66 -38 47 -33 33 C -27 21 -18 10 -19 -2 C -21 -11 -27 -22 -27 -36 C -27 -49 -21 -62 0 -62 Z" fill="#C25E2A"/>
      <path d="M 0 -62 C 21 -62 27 -49 27 -36 C 27 -22 21 -11 19 -2 C 18 10 27 21 33 33 C 38 47 35 66 19 70 C 14 72 2 73 0 73 C 10 52 12 30 8 4 C 6 -10 5 -18 7 -34 C 8 -48 5 -56 0 -62 Z" fill="#A84A22" opacity="0.38"/>
      <!-- neck -->
      <path d="M -5 -62 L -5 -160 L 5 -160 L 5 -62 Z" fill="#6B3410"/>
      <!-- headstock -->
      <path d="M -7 -160 L 7 -160 L 9 -178 L -9 -178 Z" fill="#5A2A0D"/>
      <!-- sound hole + bridge -->
      <circle cx="0" cy="22" r="9" fill="#3A1F0E"/>
      <rect x="-9" y="44" width="18" height="5" rx="2" fill="#6B3410"/>
      <!-- strings -->
      <g stroke="#F2D9A8" stroke-width="0.9" opacity="0.55">
        <line x1="-3" y1="46" x2="-3" y2="-158"/>
        <line x1="0" y1="46" x2="0" y2="-158"/>
        <line x1="3" y1="46" x2="3" y2="-158"/>
      </g>
    </g>
    <!-- left (fretting) arm to the neck -->
    <path d="M -20 -146 Q -52 -150 -80 -144" stroke="#6B3410" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="-82" cy="-143" r="6" fill="#6B3410"/>
    <!-- right (strumming) arm over the sound hole -->
    <path d="M 22 -146 Q 42 -96 33 -58" stroke="#6B3410" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="33" cy="-56" r="6" fill="#6B3410"/>
  </g>

  <!-- ============ Singer (right, hip-length top + legs) ============ -->
  <g transform="translate(902, 410)">
    <!-- legs -->
    <g fill="#6B3410">
      <path d="M -22 -118 L -28 0 L -14 0 L -9 -116 Z"/>
      <path d="M 22 -118 L 28 0 L 14 0 L 9 -116 Z"/>
    </g>
    <!-- hip-length top (terracotta) -->
    <path d="M -19 -224 Q -23 -186 -22 -150 L -25 -116 L 25 -116 L 22 -150 Q 23 -186 19 -224 Q 10 -234 0 -234 Q -10 -234 -19 -224 Z" fill="#C25E2A"/>
    <!-- head -->
    <circle cx="0" cy="-244" r="21" fill="#6B3410"/>
    <!-- raised arm -->
    <path d="M -15 -214 Q -44 -232 -40 -268" stroke="#6B3410" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- open arm -->
    <path d="M 16 -212 Q 44 -200 50 -172" stroke="#6B3410" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ============ Floating musical notes ============ -->
  <g fill="#6B3410">
    <!-- eighth-note pair, upper centre -->
    <g transform="translate(456, 92) scale(1.35)">
      <ellipse cx="0" cy="0" rx="8" ry="6"/>
      <ellipse cx="32" cy="-5" rx="8" ry="6"/>
      <rect x="6" y="-44" width="3" height="44"/>
      <rect x="38" y="-49" width="3" height="44"/>
      <path d="M 6 -44 L 41 -49 L 41 -40 L 6 -35 Z"/>
    </g>
    <!-- single eighth note, terracotta, left (moved down, clear of the tag) -->
    <g transform="translate(206, 196) scale(1.35)" fill="#C25E2A">
      <ellipse cx="0" cy="0" rx="8" ry="6" transform="rotate(-18)"/>
      <rect x="6" y="-40" width="3" height="40"/>
      <path d="M 9 -40 Q 24 -36 20 -18" stroke="#C25E2A" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <!-- single eighth note, brown, right of centre -->
    <g transform="translate(726, 104) scale(1.35)">
      <ellipse cx="0" cy="0" rx="8" ry="6" transform="rotate(-18)"/>
      <rect x="6" y="-42" width="3" height="42"/>
      <path d="M 9 -42 Q 24 -38 20 -20" stroke="#6B3410" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <!-- small note, far right gold -->
    <g transform="translate(1008, 150) scale(1.35)" fill="#D4A047">
      <ellipse cx="0" cy="0" rx="7" ry="5" transform="rotate(-18)"/>
      <rect x="5" y="-34" width="3" height="34"/>
      <path d="M 8 -34 Q 21 -31 18 -15" stroke="#D4A047" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>

</svg>
