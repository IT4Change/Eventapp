<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <title>Mandala motif — sacred geometry brand element</title>
  <desc>Decorative mandala combining sun rays, petals, and concentric circles. Use as section divider, watermark, or brand seal.</desc>

  <g transform="translate(300, 300)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer ring -->
    <circle r="280" stroke="#6B3410" stroke-width="1.5"/>
    <circle r="270" stroke="#6B3410" stroke-width="0.8" stroke-dasharray="3 5"/>

    <!-- 12 petals outer -->
    <g stroke="#C25E2A" stroke-width="2">
      <g><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(30)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(60)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(90)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(120)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(150)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(180)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(210)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(240)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(270)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(300)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
      <g transform="rotate(330)"><path d="M 0 -250 Q 25 -190 0 -130 Q -25 -190 0 -250 Z" fill="#D4A047" fill-opacity="0.15"/></g>
    </g>

    <!-- Middle ring -->
    <circle r="120" stroke="#6B3410" stroke-width="1.2"/>

    <!-- 8 petals inner -->
    <g stroke="#6B3410" stroke-width="1.8" fill="#C25E2A" fill-opacity="0.3">
      <g><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
      <g transform="rotate(45)"><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
      <g transform="rotate(90)"><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
      <g transform="rotate(135)"><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
      <g transform="rotate(225)"><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
      <g transform="rotate(270)"><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
      <g transform="rotate(315)"><ellipse cx="0" cy="-85" rx="20" ry="50"/></g>
    </g>

    <!-- Inner sun -->
    <circle r="50" fill="#D4A047" stroke="#6B3410" stroke-width="2"/>
    <circle r="30" fill="#C25E2A" stroke="#6B3410" stroke-width="1.5"/>
    <circle r="12" fill="#6B3410"/>

    <!-- Decorative dots between petals -->
    <g fill="#6B3410">
      <circle cx="0" cy="-200" r="4"/>
      <circle cx="100" cy="-173" r="4"/>
      <circle cx="173" cy="-100" r="4"/>
      <circle cx="200" cy="0" r="4"/>
      <circle cx="173" cy="100" r="4"/>
      <circle cx="100" cy="173" r="4"/>
      <circle cx="0" cy="200" r="4"/>
      <circle cx="-100" cy="173" r="4"/>
      <circle cx="-173" cy="100" r="4"/>
      <circle cx="-200" cy="0" r="4"/>
      <circle cx="-173" cy="-100" r="4"/>
      <circle cx="-100" cy="-173" r="4"/>
    </g>

  </g>
</svg>
