<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <title>Soul² monogram</title>
  <desc>Circular S² mark for favicons, social avatars, and seal use.</desc>

  <!-- Outer circle (cacao) -->
  <circle cx="160" cy="160" r="150" fill="#6B3410"/>

  <!-- Inner ring (rust) -->
  <circle cx="160" cy="160" r="135" fill="none" stroke="#C25E2A" stroke-width="2" opacity="0.6"/>

  <!-- Inner sun glow -->
  <circle cx="160" cy="160" r="115" fill="#D4A047"/>

  <!-- Decorative sun rays -->
  <g stroke="#6B3410" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="160" y1="22" x2="160" y2="36"/>
    <line x1="160" y1="284" x2="160" y2="298"/>
    <line x1="22" y1="160" x2="36" y2="160"/>
    <line x1="284" y1="160" x2="298" y2="160"/>
    <line x1="62" y1="62" x2="72" y2="72"/>
    <line x1="248" y1="248" x2="258" y2="258"/>
    <line x1="62" y1="258" x2="72" y2="248"/>
    <line x1="248" y1="72" x2="258" y2="62"/>
  </g>

  <!-- Stylized S -->
  <text x="135" y="220" text-anchor="middle"
        font-family="Brush Script MT, 'Lucida Handwriting', cursive"
        font-size="220" font-weight="400" fill="#6B3410"
        font-style="italic">S</text>

  <!-- Superscript 2 -->
  <text x="220" y="130" text-anchor="middle"
        font-family="Georgia, serif"
        font-size="72" font-weight="500" fill="#C25E2A">2</text>

</svg>
