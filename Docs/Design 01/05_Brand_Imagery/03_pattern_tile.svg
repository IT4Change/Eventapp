<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Repeating boho pattern tile</title>
  <desc>Seamless repeating pattern. Sun bursts, dots, triangles and dashes — for backgrounds, dividers, paper liners.</desc>

  <rect width="400" height="400" fill="#F7EFE0"/>

  <!-- Sun motif top-left -->
  <g transform="translate(100, 100)" stroke="#C25E2A" stroke-width="2" fill="none">
    <circle r="25" fill="#D4A047" stroke="#6B3410"/>
    <g stroke="#6B3410" stroke-linecap="round">
      <line x1="0" y1="-40" x2="0" y2="-32"/>
      <line x1="0" y1="40" x2="0" y2="32"/>
      <line x1="-40" y1="0" x2="-32" y2="0"/>
      <line x1="40" y1="0" x2="32" y2="0"/>
      <line x1="-28" y1="-28" x2="-22" y2="-22"/>
      <line x1="28" y1="28" x2="22" y2="22"/>
      <line x1="-28" y1="28" x2="-22" y2="22"/>
      <line x1="28" y1="-28" x2="22" y2="-22"/>
    </g>
  </g>

  <!-- Sun motif bottom-right -->
  <g transform="translate(300, 300)" stroke="#C25E2A" stroke-width="2" fill="none">
    <circle r="25" fill="#D4A047" stroke="#6B3410"/>
    <g stroke="#6B3410" stroke-linecap="round">
      <line x1="0" y1="-40" x2="0" y2="-32"/>
      <line x1="0" y1="40" x2="0" y2="32"/>
      <line x1="-40" y1="0" x2="-32" y2="0"/>
      <line x1="40" y1="0" x2="32" y2="0"/>
      <line x1="-28" y1="-28" x2="-22" y2="-22"/>
      <line x1="28" y1="28" x2="22" y2="22"/>
      <line x1="-28" y1="28" x2="-22" y2="22"/>
      <line x1="28" y1="-28" x2="22" y2="-22"/>
    </g>
  </g>

  <!-- Triangles top-right -->
  <g transform="translate(300, 100)" fill="#7A8B4A">
    <path d="M 0 -20 L 18 12 L -18 12 Z"/>
    <path d="M -35 25 L -22 5 L -8 25 Z" fill="#C25E2A"/>
    <path d="M 35 25 L 22 5 L 8 25 Z" fill="#C25E2A"/>
  </g>

  <!-- Triangles bottom-left -->
  <g transform="translate(100, 300)" fill="#7A8B4A">
    <path d="M 0 -20 L 18 12 L -18 12 Z"/>
    <path d="M -35 25 L -22 5 L -8 25 Z" fill="#C25E2A"/>
    <path d="M 35 25 L 22 5 L 8 25 Z" fill="#C25E2A"/>
  </g>

  <!-- Dot clusters at center and corners -->
  <g fill="#6B3410">
    <!-- Center cluster -->
    <circle cx="200" cy="200" r="4"/>
    <circle cx="180" cy="200" r="3"/>
    <circle cx="220" cy="200" r="3"/>
    <circle cx="200" cy="180" r="3"/>
    <circle cx="200" cy="220" r="3"/>

    <!-- Corner dots -->
    <circle cx="20" cy="20" r="3"/>
    <circle cx="380" cy="20" r="3"/>
    <circle cx="20" cy="380" r="3"/>
    <circle cx="380" cy="380" r="3"/>

    <!-- Edge dots -->
    <circle cx="200" cy="20" r="3"/>
    <circle cx="200" cy="380" r="3"/>
    <circle cx="20" cy="200" r="3"/>
    <circle cx="380" cy="200" r="3"/>
  </g>

  <!-- Decorative dashes -->
  <g stroke="#6B3410" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="40" y1="190" x2="60" y2="190"/>
    <line x1="40" y1="200" x2="60" y2="200"/>
    <line x1="40" y1="210" x2="60" y2="210"/>

    <line x1="340" y1="190" x2="360" y2="190"/>
    <line x1="340" y1="200" x2="360" y2="200"/>
    <line x1="340" y1="210" x2="360" y2="210"/>

    <line x1="190" y1="40" x2="190" y2="60"/>
    <line x1="200" y1="40" x2="200" y2="60"/>
    <line x1="210" y1="40" x2="210" y2="60"/>

    <line x1="190" y1="340" x2="190" y2="360"/>
    <line x1="200" y1="340" x2="200" y2="360"/>
    <line x1="210" y1="340" x2="210" y2="360"/>
  </g>

</svg>
